<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satisfactory Factories</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <script defer src="/assets/js/fa-brands.min.js"></script>
    <script defer src="/assets/js/fa-solid.min.js"></script>
    <script defer src="/assets/js/fa.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/material-theme.css" />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Web.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        <div class="blazor-error-content">
            <strong>An error has occurred.</strong>
            <span id="blazor-error-message"></span>
            <div class="blazor-error-actions">
                <a href="." class="reload">Reload</a>
                <a href="/error" class="error-details-link">View Error Details</a>
                <span class="dismiss">🗙</span>
            </div>
        </div>
    </div>
    <script>
        // Capture unhandled errors and save them to localStorage for the error page
        // Use a flag to avoid capturing Blazor framework initialization errors
        var blazorReady = false;
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () { blazorReady = true; }, 3000);
        });
        window.addEventListener('error', function (event) {
            try {
                var errorMessage = event.message || 'Unknown error';
                if (event.error && event.error.stack) {
                    errorMessage = event.error.stack;
                }
                localStorage.setItem('error', errorMessage);
                var msgEl = document.getElementById('blazor-error-message');
                if (msgEl) {
                    msgEl.textContent = ' ' + event.message;
                }
            } catch (e) { /* ignore */ }
        });
        window.addEventListener('unhandledrejection', function (event) {
            try {
                var shortMessage = event.reason ? (event.reason.message || event.reason.toString()) : 'Unhandled promise rejection';
                var fullMessage = event.reason ? (event.reason.stack || shortMessage) : shortMessage;
                localStorage.setItem('error', fullMessage);
                var msgEl = document.getElementById('blazor-error-message');
                if (msgEl) {
                    msgEl.textContent = ' ' + shortMessage;
                }
            } catch (e) { /* ignore */ }
        });
    </script>
    <script src="_framework/blazor.webassembly#[.{fingerprint}].js"></script>
</body>

</html>
